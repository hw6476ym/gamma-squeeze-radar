name: refresh-gamma-data

on:
  schedule:
    # 21:30 UTC = 5:30pm ET, 30min after the US close
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit refreshed data
        run: |
          if [[ -z "$(git status --porcelain data/data.json)" ]]; then
            echo "No data changes; skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git commit -m "data: refresh gamma exposure snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
