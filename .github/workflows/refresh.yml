name: refresh-gamma-data

on:
  schedule:
    # US market hours = 13:30–20:00 UTC Mon–Fri (9:30am–4:00pm ET, ignoring DST drift).
    # GitHub cron does not have a "minute interval" syntax, so we list explicit
    # times. Every 10 min during the cash session + a few wider passes around it.
    - cron: "30,40,50 13 * * 1-5"
    - cron: "*/10 14-19 * * 1-5"
    - cron: "0,10,20 20 * * 1-5"
    # Pre-market sanity pass (~1hr before open)
    - cron: "30 12 * * 1-5"
    # Post-close definitive snapshot
    - cron: "30 21 * * 1-5"
    # Weekend nudge so weekend visitors see fresh-ish data
    - cron: "0 14 * * 0,6"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit refreshed data
        run: |
          if [[ -z "$(git status --porcelain data/data.json)" ]]; then
            echo "No data changes; skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git commit -m "data: refresh gamma exposure snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
